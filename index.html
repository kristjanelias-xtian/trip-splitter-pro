<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-visual" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Spl1t" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#e8613a" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1A1A2E" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=2" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <script>
      (function () {
        try {
          var isKopikas = location.hostname.startsWith('kopikas.') ||
            new URLSearchParams(location.search).get('app') === 'kopikas' ||
            localStorage.getItem('kopikas:dev-mode') === 'true';
          if (isKopikas) {
            document.documentElement.classList.add('dark', 'kopikas-theme');
            document.title = 'Kopikas';
            document.querySelectorAll('meta[name="theme-color"]').forEach(function(m) {
              m.setAttribute('content', '#d97706');
            });
            var appleName = document.querySelector('meta[name="apple-mobile-web-app-title"]');
            if (appleName) appleName.setAttribute('content', 'Kopikas');
            // Swap icons and manifest for Kopikas
            var favicon32 = document.querySelector('link[rel="icon"][sizes="32x32"]');
            if (favicon32) favicon32.href = '/kopikas-favicon.png';
            var favicon16 = document.querySelector('link[rel="icon"][sizes="16x16"]');
            if (favicon16) favicon16.href = '/kopikas-favicon.png';
            var appleIcon = document.querySelector('link[rel="apple-touch-icon"]');
            if (appleIcon) appleIcon.href = '/kopikas-apple-touch-icon.png';
            var manifest = document.querySelector('link[rel="manifest"]');
            if (manifest) {
              // Use a real URL (not blob:) so iOS Safari fetches it at "Add to Home Screen" time.
              // The Pages Function intercepts ?start= and returns manifest JSON with that start_url.
              var path = location.pathname;
              var isWalletRoute = path !== '/' && path !== '/login' && path !== '/create'
                && !path.endsWith('/parent');
              var manifestUrl = '/kopikas-manifest.webmanifest';
              if (isWalletRoute) {
                manifestUrl += '?start=' + encodeURIComponent(path);
              }
              manifest.href = manifestUrl;
            }
          } else {
            var stored = localStorage.getItem('spl1t:theme');
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (stored === 'dark' || (!stored || stored === 'system') && prefersDark) {
              document.documentElement.classList.add('dark');
            }
          }
        } catch (e) {}
      })();
    </script>
    <title>Spl1t</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function (err) {
            console.warn('SW registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
